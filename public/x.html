<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Grid</title>
  <style>

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
    }

    .grid-item {
      border-radius: 15%;
      padding: 10px;
    }

    .grid-item img {
      border-radius: 15%;
      width: 100%;
      height: 100%;
      object-fit: contain;
      aspect-ratio: 1;
    }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      backdrop-filter: blur(10px);
      align-items: center;
      justify-content: center;
    }

    #lightbox.active { display: flex; }

    #lightbox-img {
      object-fit: contain;
      animation: popIn 0.28s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { transform: scale(0.45); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }

    #lb-prev, #lb-next {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      object-fit: contain;
      cursor: pointer;
      opacity: 0.7;
      transition: opacity 0.15s, transform 0.15s;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
      /* override any lightbox-img styles leaking in */
      border-radius: 0;
      animation: none !important;
    }

    #lb-prev { left: 18px; }
    #lb-next { right: 18px; }
  </style>
</head>
<body>

  <div class="grid" id="grid"></div>

  <div id="lightbox">
    <span id="lightbox-close"></span>

    <img id="lb-prev" src="icons/arrow-left.png" alt="left arrow">

    <img id="lightbox-img" src="" alt="" />

    <img id="lb-next" src="icons/arrow-right.png" alt="right arrow">

  </div>

  <script>
    // ── Add your images here ──────────────────────────────
    const srcs = [
      'imgs/charm/cute-star.png'
    ];
    // ─────────────────────────────────────────────────────

    const TOTAL = srcs.length;
    const grid  = document.getElementById('grid');

    srcs.forEach((src, i) => {
      const item = document.createElement('div');
      item.className = 'grid-item';
      const img = document.createElement('img');
      img.src = src;
      img.alt = `Photo ${i + 1}`;
      img.dataset.index = i;
      item.appendChild(img);
      grid.appendChild(item);
    });

    // ── Lightbox ──────────────────────────────────────────
    const overlay  = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lightbox-img');
    const closeBtn = document.getElementById('lightbox-close');
    const prevBtn  = document.getElementById('lb-prev');
    const nextBtn  = document.getElementById('lb-next');

    let current = 0;

    function show(index) {
      current = (index + TOTAL) % TOTAL;
      lbImg.src = srcs[current];
      lbImg.alt = `Photo ${current + 1}`;
      lbImg.style.animation = 'none';
      lbImg.offsetHeight;
      lbImg.style.animation = '';
      overlay.classList.add('active');
    }

    function close() {
      overlay.classList.remove('active');
      lbImg.src = '';
    }

    document.querySelectorAll('.grid-item img').forEach(img => {
      img.addEventListener('click', () => show(+img.dataset.index));
    });

    closeBtn.addEventListener('click', close);
    prevBtn.addEventListener('click',  e => { e.stopPropagation(); show(current - 1); });
    nextBtn.addEventListener('click',  e => { e.stopPropagation(); show(current + 1); });
    overlay.addEventListener('click',  close);
    lbImg.addEventListener('click',    e => e.stopPropagation());

    document.addEventListener('keydown', e => {
      if (!overlay.classList.contains('active')) return;
      if (e.key === 'Escape')     close();
      if (e.key === 'ArrowLeft')  show(current - 1);
      if (e.key === 'ArrowRight') show(current + 1);
    });
  </script>
</body>
</html>
