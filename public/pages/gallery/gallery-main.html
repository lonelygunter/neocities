<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>gunterxd</title>
    <link rel="icon" type="image/x-icon" href="../../icons/smeargle.png">
    <link rel="stylesheet" href="../../css/styles.css">
  </head>

<body>

<div class="cursor"></div>

  <div class="three-columns">

    <!-- 1th column -->
    <div id="left charms"></div>
    
    <!-- 2th column -->
    <div id="main"></div>
    
    <!-- 3th column -->
    <div id="right charms"></div>

  </div>

<!-- import pages -->
<script>
  async function loadComponent(id, file) {
    const res = await fetch(file);
    const html = await res.text();
    document.getElementById(id).innerHTML = html;
  }

  loadComponent('left charms', '../home/charms-left.html');
  loadComponent('right charms', '../home/charms-right.html');

  loadComponent('header', '../home/header.html');
  loadComponent('navigate', '../home/navigate.html');
  loadComponent('badges', '../home/badges.html');

  loadComponent('main', '../gallery/gallery-structure.html');
  loadComponent('gallery', '../gallery/gallery.html');

</script>

</body>
</html>
