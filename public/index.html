<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>gunterxd</title>
    <link rel="icon" type="image/x-icon" href="icons/smeargle.png">
    <link rel="stylesheet" href="css/styles.css">
  </head>

<body>

<div class="cursor"></div>

  <div class="three-columns">

    <!-- 1th column -->
    <div id="left charms"></div>
    
    <!-- 2th column -->
    <div id="main"></div>
    
    <!-- 3th column -->
    <div id="right charms"></div>

  </div>

<!-- import pages -->
<script>
  async function loadComponent(id, file) {
    const res = await fetch(file);
    const html = await res.text();
    document.getElementById(id).innerHTML = html;
  }

  loadComponent('left charms', 'pages/home/charms-left.html');
  loadComponent('right charms', 'pages/home/charms-right.html');

  loadComponent('main', 'pages/home/home-main.html');
    loadComponent('header', 'pages/home/header.html');
    loadComponent('navigate', 'pages/home/navigate.html');
    loadComponent('badges', 'pages/home/badges.html');
    loadComponent('description', 'pages/home/description.html');
    loadComponent('gallery', 'pages/home/gallery-mini.html');

</script>

</body>
</html>
