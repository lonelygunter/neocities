<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>gunterxd</title>
    <link rel="icon" type="image/x-icon" href="icons/smeargle.png">
    <link rel="stylesheet" href="css/styles.css">
  </head>

<body>

<div class="cursor"></div>

  <div class="three-columns">

    <!-- 1th column -->
    <div id="left-charms"></div>

    <!-- 2th column -->
    <div class="column">

      <!-- header -->
      <div class="column glass">

        <div id="header"></div>

      </div>

      <div class="three-columns">

        <!-- left column -->
        <div class="column glass">
          <div id="navigate"></div>
        </div>

        <!-- center column -->
        <div class="column glass">
        <div id="gallery"></div>
        </div>

        <!-- right column -->
        <div class="column glass">
          <div id="badges"></div>
        </div>

      </div>

    </div>
    
    <!-- 3th column -->
    <div id="right-charms"></div>

  </div>

<!-- import pages -->
<script>
  async function loadComponent(id, file) {
    const res = await fetch(file);
    const html = await res.text();
    document.getElementById(id).innerHTML = html;
  }

  loadComponent('left-charms', 'pages/home/charms-left.html');
  loadComponent('right-charms', 'pages/home/charms-right.html');

  loadComponent('header', 'pages/home/header.html');
  loadComponent('navigate', 'pages/home/navigate.html');
  loadComponent('badges', 'pages/home/badges.html');

  loadComponent('gallery', 'pages/gallery/gallery.html');

</script>

</body>
</html>
